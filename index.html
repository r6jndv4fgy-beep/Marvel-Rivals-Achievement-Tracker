<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070a12">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Marvel Rivals Heroic Journey Tracker</title>
<style>
:root {
  --bg:#070a12; --panel:#101827; --card:#151f33; --text:#f8fafc; --muted:#aeb9cb;
  --line:#334158; --accent:#e62429; --gold:#f6c85f; --silver:#d8dee9; --good:#39d979;
  --shadow:0 12px 30px rgba(0,0,0,.35);
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { margin:0; min-height:100%; }
body {
  background:radial-gradient(circle at 10% 0%, rgba(230,36,41,.28), transparent 28rem),
    radial-gradient(circle at 90% 10%, rgba(60,110,255,.18), transparent 24rem),
    linear-gradient(180deg, var(--bg), #03050a 70%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  padding:max(14px,env(safe-area-inset-top)) 12px max(28px,env(safe-area-inset-bottom));
}
.app { max-width:720px; margin:0 auto; }
header {
  position:sticky; top:0; z-index:20; padding:2px 0 12px;
  background:linear-gradient(180deg, rgba(7,10,18,.98) 0%, rgba(7,10,18,.94) 84%, rgba(7,10,18,0) 100%);
  backdrop-filter:blur(14px);
}
.heroTitle {
  border:1px solid rgba(255,255,255,.08); border-radius:24px; padding:16px;
  background:linear-gradient(135deg, rgba(230,36,41,.22), rgba(16,24,39,.94) 48%, rgba(39,55,92,.55));
  box-shadow:var(--shadow);
}
.kicker { color:#ffb4b7; letter-spacing:.16em; text-transform:uppercase; font-weight:900; font-size:12px; margin-bottom:4px; }
h1 { margin:0; font-size:28px; line-height:1; letter-spacing:-.04em; }
.subtitle { margin-top:5px; color:var(--muted); font-size:14px; }
.progressRow { display:flex; align-items:center; gap:12px; margin-top:14px; }
.progressText { min-width:96px; }
#completeCount { font-size:22px; font-weight:1000; line-height:1; }
#pointCount { margin-top:3px; color:var(--muted); font-size:13px; }
.bar { flex:1; height:15px; border-radius:999px; background:rgba(255,255,255,.12); overflow:hidden; border:1px solid rgba(255,255,255,.08); }
.fill { height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg, var(--accent), #ff7a3d, var(--gold)); transition:width .22s ease; }
.controls { margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.searchWrap { grid-column:1/-1; position:relative; }
.searchIcon { position:absolute; left:14px; top:50%; transform:translateY(-50%); opacity:.75; }
#search {
  width:100%; padding:15px 14px 15px 40px; border:1px solid var(--line); border-radius:18px;
  background:rgba(16,24,39,.92); color:var(--text); font-size:16px; outline:none;
}
#search:focus { border-color:rgba(230,36,41,.85); box-shadow:0 0 0 3px rgba(230,36,41,.18); }
button {
  border:1px solid var(--line); border-radius:16px; background:rgba(16,24,39,.92); color:var(--text);
  padding:13px 12px; font-size:15px; font-weight:900;
}
button.active,button.selected { background:linear-gradient(135deg, rgba(230,36,41,.95), rgba(137,21,25,.95)); border-color:rgba(255,255,255,.18); }
.pointTabs { display:flex; gap:8px; grid-column:1/-1; }
.pointTabs button { flex:1; padding:11px 8px; font-size:14px; }
.heroScroller { margin-top:9px; display:flex; gap:8px; overflow-x:auto; padding:2px 0 8px; scrollbar-width:none; }
.heroScroller::-webkit-scrollbar { display:none; }
.heroChip {
  flex:0 0 auto; border:1px solid var(--line); border-radius:999px; background:rgba(16,24,39,.9);
  padding:10px 13px; color:var(--text); font-size:14px; font-weight:900; white-space:nowrap;
}
.heroChip.selected { background:linear-gradient(135deg, rgba(230,36,41,.92), rgba(255,100,65,.7)); border-color:rgba(255,255,255,.24); }
.statusLine { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px 2px 3px; color:var(--muted); font-size:13px; }
#resultCount { font-weight:800; }
.section { margin:18px 4px 9px; color:#cbd5e1; font-size:13px; font-weight:1000; letter-spacing:.08em; text-transform:uppercase; }
.card {
  display:flex; gap:13px; align-items:flex-start; width:100%; border:1px solid rgba(255,255,255,.1);
  border-left:5px solid var(--silver); border-radius:22px; padding:15px 14px; margin:10px 0;
  background:linear-gradient(145deg, rgba(255,255,255,.045), rgba(255,255,255,0)), linear-gradient(180deg, var(--card), #101827);
  box-shadow:0 8px 22px rgba(0,0,0,.22); transition:transform .12s ease, opacity .18s ease, border-color .18s ease;
}
.card:active { transform:scale(.985); }
.card[data-points="10"] { border-left-color:var(--gold); }
.card.done { opacity:.56; }
.card.done .title,.card.done .desc { text-decoration:line-through; }
.check { position:absolute; opacity:.001; width:1px; height:1px; }
.box {
  width:42px; height:42px; border-radius:14px; border:3px solid #7f8ba0; flex:0 0 auto;
  display:grid; place-items:center; margin-top:2px; background:rgba(255,255,255,.04);
}
.box:after { content:""; width:11px; height:22px; border:solid transparent; border-width:0 5px 5px 0; transform:rotate(45deg); margin-top:-5px; }
.check:checked + .box { background:var(--good); border-color:var(--good); box-shadow:0 0 18px rgba(57,217,121,.25); }
.check:checked + .box:after { border-color:#06120a; }
.text { flex:1; min-width:0; }
.topline { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.title { display:block; font-size:19px; line-height:1.12; font-weight:1000; letter-spacing:-.02em; }
.points {
  border:1px solid rgba(255,255,255,.12); border-radius:999px; padding:4px 9px; color:#111827;
  background:var(--silver); font-weight:1000; font-size:12px; white-space:nowrap;
}
.card[data-points="10"] .points { background:var(--gold); }
.heroBadge {
  display:inline-flex; margin-top:7px; border:1px solid rgba(255,255,255,.1); border-radius:999px;
  padding:4px 9px; background:rgba(230,36,41,.13); color:#ffd2d4; font-size:13px; font-weight:900;
}
.desc { display:block; margin-top:8px; color:var(--muted); font-size:16px; line-height:1.32; }
.empty {
  display:none; padding:28px 16px; margin-top:16px; border:1px dashed var(--line); border-radius:22px;
  color:var(--muted); text-align:center; background:rgba(16,24,39,.55);
}
.empty.show { display:block; }
.hidden { display:none !important; }
.footer { height:70px; }
@media (min-width:700px) {
  body { padding-left:18px; padding-right:18px; }
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .section { grid-column:1/-1; }
  .card { margin:0; }
}
</style>

<script>
(function() {
  const STORAGE_KEY = "rivals_companion_heroic_journey_static_v1";
  const cards = Array.from(document.querySelectorAll(".card"));
  const checks = Array.from(document.querySelectorAll(".check"));
  const searchEl = document.getElementById("search");
  const hideBtn = document.getElementById("hideDone");
  const resetBtn = document.getElementById("reset");
  const fillEl = document.getElementById("fill");
  const completeCountEl = document.getElementById("completeCount");
  const pointCountEl = document.getElementById("pointCount");
  const resultCountEl = document.getElementById("resultCount");
  const activeFilterEl = document.getElementById("activeFilter");
  const emptyEl = document.getElementById("empty");
  const pointTabs = Array.from(document.querySelectorAll(".pointTab"));
  const heroChips = Array.from(document.querySelectorAll(".heroChip"));

  let hideDone = false;
  let activePoints = "all";
  let activeHero = "All";

  function load() {
    try {
      const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      if (state.done) {
        checks.forEach(c => c.checked = !!state.done[c.id]);
      }
      hideDone = !!state.hideDone;
      activePoints = state.activePoints || "all";
      activeHero = state.activeHero || "All";
      searchEl.value = state.query || "";
    } catch(e) {}
  }

  function save() {
    const done = {};
    checks.forEach(c => done[c.id] = c.checked);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        done: done,
        hideDone: hideDone,
        activePoints: activePoints,
        activeHero: activeHero,
        query: searchEl.value
      }));
    } catch(e) {}
  }

  function updateSections() {
    document.querySelectorAll(".section").forEach(section => {
      let el = section.nextElementSibling;
      let hasVisible = false;
      while (el && !el.classList.contains("section")) {
        if (el.classList.contains("card") && !el.classList.contains("hidden")) {
          hasVisible = true;
          break;
        }
        el = el.nextElementSibling;
      }
      section.classList.toggle("hidden", !hasVisible);
    });
  }

  function render() {
    const q = searchEl.value.trim().toLowerCase();
    let visible = 0;
    let doneCount = 0;
    let donePoints = 0;
    let totalPoints = 0;

    cards.forEach(card => {
      const check = card.querySelector(".check");
      const points = Number(card.dataset.points);
      totalPoints += points;

      if (check.checked) {
        doneCount++;
        donePoints += points;
      }

      const matchesSearch = !q || card.dataset.search.includes(q);
      const matchesPoints = activePoints === "all" || card.dataset.points === activePoints;
      const matchesHero = activeHero === "All" || card.dataset.hero === activeHero;
      const matchesDone = !hideDone || !check.checked;
      const show = matchesSearch && matchesPoints && matchesHero && matchesDone;

      card.classList.toggle("done", check.checked);
      card.classList.toggle("hidden", !show);
      if (show) visible++;
    });

    fillEl.style.width = ((doneCount / cards.length) * 100) + "%";
    completeCountEl.textContent = doneCount + " / " + cards.length;
    pointCountEl.textContent = donePoints + " / " + totalPoints + " pts";
    resultCountEl.textContent = "Showing " + visible + " of " + cards.length;
    activeFilterEl.textContent = activeHero === "All" ? "All heroes" : activeHero;
    emptyEl.classList.toggle("show", visible === 0);

    hideBtn.classList.toggle("active", hideDone);
    hideBtn.textContent = hideDone ? "Showing Open" : "Hide Done";

    pointTabs.forEach(btn => btn.classList.toggle("selected", btn.dataset.points === activePoints));
    heroChips.forEach(btn => btn.classList.toggle("selected", btn.dataset.hero === activeHero));

    updateSections();
  }

  checks.forEach(check => {
    check.addEventListener("change", () => {
      save();
      render();
    });
  });

  cards.forEach(card => {
    card.addEventListener("click", event => {
      if (event.target.classList.contains("check")) return;
      const check = card.querySelector(".check");
      check.checked = !check.checked;
      save();
      render();
    });
  });

  searchEl.addEventListener("input", () => {
    save();
    render();
  });

  hideBtn.addEventListener("click", () => {
    hideDone = !hideDone;
    save();
    render();
  });

  resetBtn.addEventListener("click", () => {
    if (!confirm("Reset all completed achievements?")) return;
    checks.forEach(c => c.checked = false);
    save();
    render();
  });

  pointTabs.forEach(btn => {
    btn.addEventListener("click", () => {
      activePoints = btn.dataset.points;
      save();
      render();
    });
  });

  heroChips.forEach(btn => {
    btn.addEventListener("click", () => {
      activeHero = btn.dataset.hero;
      save();
      render();
    });
  });

  load();
  render();
})();
</script>
